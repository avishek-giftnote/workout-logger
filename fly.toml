# fly.toml — Fly.io deploy template for Workout Logger (single jar: backend serves the bundled SPA).
# `app` must be globally unique on Fly; rename it or just run `fly launch` (which regenerates this file
# with your chosen name and primary region). Set secrets out-of-band, NEVER here:
#   fly secrets set MONGODB_URI=... SECURITY_JWT_SECRET=...

app = "workout-logger"
primary_region = "syd"  # placeholder — pick the region nearest your users / Mongo Atlas cluster

[build]
  dockerfile = "Dockerfile"

[env]
  # Activates the 'prod' Spring profile, which makes a blank SECURITY_JWT_SECRET fail-fast at startup
  # (audit M7) instead of silently falling back to an ephemeral key. Set the real secret with:
  #   fly secrets set SECURITY_JWT_SECRET="<32+ random bytes>"
  SPRING_PROFILES_ACTIVE = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/actuator/health"   # requires spring-boot-starter-actuator (owned by the backend lane)
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
