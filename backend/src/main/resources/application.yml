# Listen on the platform-assigned port when present (Railway injects $PORT), else 8080.
# The default keeps local dev, CI, and the packaged jar on 8080 unchanged.
server:
  port: ${PORT:8080}

spring:
  application:
    name: workout-logger-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/workoutlogger}
      auto-index-creation: false   # indexes are created explicitly by MongoSchemaInitializer

security:
  jwt:
    # First-party (SPA) token lifetime. The signing SECRET is gone: since the Phase-3 cutover the
    # first-party token is RS256, signed by the Authorization Server key (see `oauth.signing-jwk`
    # below), so SECURITY_JWT_SECRET is dead and ignored if still set.
    expiry-minutes: ${SECURITY_JWT_EXPIRY_MINUTES:10080}
  # Per-IP fixed-window rate limit on /api/auth/** (login + register). In-memory, single-instance only;
  # a multi-instance deploy needs a shared store (Redis). See RateLimitFilter / RateLimitProperties.
  ratelimit:
    enabled: ${SECURITY_RATELIMIT_ENABLED:true}
    capacity: ${SECURITY_RATELIMIT_CAPACITY:10}
    window-seconds: ${SECURITY_RATELIMIT_WINDOW_SECONDS:60}

# OAuth 2.1 Authorization Server (in-process) — see docs/mcp-hosting.md.
oauth:
  # RSA signing key as JWK JSON, via OAUTH_SIGNING_JWK. Signs BOTH the AS's tokens and the first-party
  # login token (one keypair, one JWKS, one rotation story). Blank => an ephemeral dev key + a WARN;
  # under the `prod` profile a blank value is a FAIL-FAST, since a regenerated key would invalidate
  # every issued token and every client's cached JWKS.
  signing-jwk: ${OAUTH_SIGNING_JWK:}
  # Public HTTPS issuer identifier (RFC 8414 — clients validate it externally, so it must never be the
  # private railway.internal host). Blank => derived per-request, which is fine in dev only.
  issuer: ${OAUTH_ISSUER:}
  # The `aud` value every token must name to be accepted by /api (the confused-deputy close).
  api-audience: ${OAUTH_API_AUDIENCE:workout-logger-api}

# Importer configuration (used when the "import" profile is active).
importer:
  csv-path: ${IMPORT_CSV:../strong_workouts.csv}
  # Current bodyweight (kg) used to backfill effective load on historical bodyweight sets.
  # Counts are independent of this value; it only sets the effective-load baseline.
  current-bodyweight-kg: ${IMPORT_BODYWEIGHT:75.0}
  # When false, the importer parses + asserts but does NOT write to MongoDB (no DB required).
  persist: ${IMPORT_PERSIST:false}
  # Account that owns the imported history (created if absent) so it is reachable via login.
  # Provide both via env when persisting; user-password has no default (never commit a real one).
  user-email: ${IMPORT_USER_EMAIL:importer@example.com}
  user-password: ${IMPORT_USER_PASSWORD:}

# Sentry error monitoring. A BLANK dsn keeps the SDK disabled (safe in dev/test/CI) — set SENTRY_DSN in prod.
# Error capture is EXPLICIT: ApiExceptionHandler.generic() calls Sentry.captureException, so only real
# unhandled 500s are sent (every 4xx is caught by a more specific @ExceptionHandler first). The
# exception-resolver-order is pinned to LOWEST precedence so the starter's auto SentryExceptionResolver runs
# after our @RestControllerAdvice (which handles everything) and therefore never double-captures. PII is off
# and the Authorization header / request body are scrubbed in SentryConfig#scrubPii.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  # Prefer an explicit SENTRY_RELEASE; otherwise fall back to Railway's injected commit SHA so errors group
  # per deploy. Both blank off-Railway ⇒ no release tag (unchanged behaviour for local/OCI).
  release: ${SENTRY_RELEASE:${RAILWAY_GIT_COMMIT_SHA:}}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0}
  send-default-pii: false
  exception-resolver-order: 2147483647   # Integer.MAX_VALUE = lowest precedence

# Actuator: expose ONLY the health endpoint (Railway's health check + the Dockerfile HEALTHCHECK hit
# /actuator/health, which is permitAll in SecurityConfig). No other endpoints are exposed — avoid info leak.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true   # adds /actuator/health/{liveness,readiness} groups for container probes
  health:
    # Never let the health check dial an SMTP server. spring-boot-starter-mail (a now-unused transitive dep)
    # would otherwise auto-register a MailHealthIndicator that pings SPRING_MAIL_HOST on every probe — and on
    # Railway (non-Pro, outbound SMTP blocked) that connect hangs, taking /actuator/health down with it.
    mail:
      enabled: false

logging:
  level:
    com.workoutlogger: INFO
