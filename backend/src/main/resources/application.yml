# Listen on the platform-assigned port when present (Railway/Heroku-style inject $PORT), else 8080.
# The default keeps local dev, the OCI/Cloudflare compose deploy, CI, and the packaged jar on 8080 unchanged.
server:
  port: ${PORT:8080}

spring:
  application:
    name: workout-logger-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/workoutlogger}
      auto-index-creation: false   # indexes are created explicitly by MongoSchemaInitializer

security:
  jwt:
    # Provide via SECURITY_JWT_SECRET (>= 32 bytes). No default: blank => an ephemeral random
    # key is generated at startup (tokens reset on restart) — fine for local dev only.
    secret: ${SECURITY_JWT_SECRET:}
    expiry-minutes: ${SECURITY_JWT_EXPIRY_MINUTES:10080}
  # Per-IP fixed-window rate limit on /api/auth/** (login + register). In-memory, single-instance only;
  # a multi-instance deploy needs a shared store (Redis). See RateLimitFilter / RateLimitProperties.
  ratelimit:
    enabled: ${SECURITY_RATELIMIT_ENABLED:true}
    capacity: ${SECURITY_RATELIMIT_CAPACITY:10}
    window-seconds: ${SECURITY_RATELIMIT_WINDOW_SECONDS:60}

# Importer configuration (used when the "import" profile is active).
importer:
  csv-path: ${IMPORT_CSV:../strong_workouts.csv}
  # Current bodyweight (kg) used to backfill effective load on historical bodyweight sets.
  # Counts are independent of this value; it only sets the effective-load baseline.
  current-bodyweight-kg: ${IMPORT_BODYWEIGHT:75.0}
  # When false, the importer parses + asserts but does NOT write to MongoDB (no DB required).
  persist: ${IMPORT_PERSIST:false}
  # Account that owns the imported history (created if absent) so it is reachable via login.
  # Provide both via env when persisting; user-password has no default (never commit a real one).
  user-email: ${IMPORT_USER_EMAIL:importer@example.com}
  user-password: ${IMPORT_USER_PASSWORD:}

# Sentry error monitoring. A BLANK dsn keeps the SDK disabled (safe in dev/test/CI) — set SENTRY_DSN in prod.
# Error capture is EXPLICIT: ApiExceptionHandler.generic() calls Sentry.captureException, so only real
# unhandled 500s are sent (every 4xx is caught by a more specific @ExceptionHandler first). The
# exception-resolver-order is pinned to LOWEST precedence so the starter's auto SentryExceptionResolver runs
# after our @RestControllerAdvice (which handles everything) and therefore never double-captures. PII is off
# and the Authorization header / request body are scrubbed in SentryConfig#scrubPii.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0}
  send-default-pii: false
  exception-resolver-order: 2147483647   # Integer.MAX_VALUE = lowest precedence

# Actuator: expose ONLY the health endpoint (Fly's health check hits /actuator/health,
# which is permitAll in SecurityConfig). No other endpoints are exposed — avoid info leak.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true   # adds /actuator/health/{liveness,readiness} groups for container probes

logging:
  level:
    com.workoutlogger: INFO
