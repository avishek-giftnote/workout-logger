spring:
  application:
    name: workout-logger-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/workoutlogger}
      auto-index-creation: false   # indexes are created explicitly by MongoSchemaInitializer

security:
  jwt:
    # MUST be >= 32 bytes. Override in production: SECURITY_JWT_SECRET=...
    secret: ${SECURITY_JWT_SECRET:set-via-SECURITY_JWT_SECRET}
    expiry-minutes: ${SECURITY_JWT_EXPIRY_MINUTES:10080}

# Importer configuration (used when the "import" profile is active).
importer:
  csv-path: ${IMPORT_CSV:../strong_workouts.csv}
  # Current bodyweight (kg) used to backfill effective load on historical bodyweight sets.
  # Counts are independent of this value; it only sets the effective-load baseline.
  current-bodyweight-kg: ${IMPORT_BODYWEIGHT:75.0}
  # When false, the importer parses + asserts but does NOT write to MongoDB (no DB required).
  persist: ${IMPORT_PERSIST:false}
  # Account that owns the imported history (created if absent) so it is reachable via login.
  user-email: ${IMPORT_USER_EMAIL:importer@example.com}
  user-password: ${IMPORT_USER_PASSWORD:changeme-via-env}

logging:
  level:
    com.workoutlogger: INFO
