name: CI

# Release gate: runs on every push + PR. No secrets — Mongo is a service container and the eval sweep is
# pure. See CLAUDE.md / DESIGN.md §6a.
on: [push, pull_request]

jobs:
  frontend-gate:
    name: frontend (typecheck · unit · eval · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run build

  mcp-gate:
    name: mcp (typecheck · unit · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test          # request-building, decimal-string guard, identity provider — no backend needed
      - run: npm run build

  backend-gate:
    name: backend (mvn test + Mongo integration)
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B test
        env:
          RUN_MONGO_TESTS: "1"   # ApiIntegrationTest defaults MONGODB_TEST_URI to localhost (the service)

  e2e:
    name: e2e (Playwright critical paths)
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Package backend jar
        working-directory: backend
        run: mvn -B -DskipTests package
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright (Chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        # Playwright's webServer boots the prod bundle (vite preview :4173) + the backend jar (:8080).
        env:
          MONGODB_URI: mongodb://localhost:27017/workoutlogger_e2e
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
